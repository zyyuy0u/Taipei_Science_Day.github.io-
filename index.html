<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>台北科學日 — 下一梯次活動時間</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Noto+Sans+TC:wght@700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFE500;        /* brutalist yellow */
    --ink:#0A0A0A;       /* near-black */
    --paper:#FAF8F2;
    --hot:#FF2D55;       /* hot pink/red */
    --acid:#00E08A;      /* acid green accent */
    --blue:#2D4BFF;
  }

  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"Noto Sans TC","Archivo Black",system-ui,sans-serif;
    overflow:hidden;
    position:relative;
  }

  /* Brutalist grid noise */
  body::before{
    content:"";
    position:fixed;inset:0;
    background-image:
      linear-gradient(var(--ink) 1px, transparent 1px),
      linear-gradient(90deg, var(--ink) 1px, transparent 1px);
    background-size:64px 64px;
    opacity:.05;
    pointer-events:none;
    z-index:0;
  }

  /* Top marquee */
  .marquee{
    position:relative;
    z-index:2;
    background:var(--ink);
    color:var(--bg);
    border-bottom:6px solid var(--ink);
    overflow:hidden;
    height:48px;
    display:flex;align-items:center;
  }
  .marquee-track{
    display:flex;gap:48px;
    white-space:nowrap;
    font-family:"Archivo Black","Noto Sans TC",sans-serif;
    font-size:20px;letter-spacing:.05em;
    animation:scroll 24s linear infinite;
  }
  .marquee span{display:inline-flex;align-items:center;gap:24px;}
  .marquee em{color:var(--hot);font-style:normal;}
  @keyframes scroll{
    from{transform:translateX(0);}
    to{transform:translateX(-50%);}
  }

  /* Layout */
  .stage{
    position:relative;z-index:1;
    height:calc(100% - 48px - 40px);
    display:grid;
    grid-template-columns: 70% 30%;
    gap:0;
  }

  /* Main panel */
  .main{
    position:relative;
    background:var(--bg);
    border-right:6px solid var(--ink);
    padding:32px 40px 28px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    overflow:hidden;
  }

  .badge-row{
    display:flex;justify-content:space-between;align-items:flex-start;gap:16px;
  }
  .label{
    display:inline-block;
    background:var(--ink);
    color:var(--bg);
    font-family:"Archivo Black",sans-serif;
    font-size:42px;
    line-height:1;
    padding:18px 26px 14px;
    border:6px solid var(--ink);
    transform:rotate(-1.2deg);
    box-shadow:10px 10px 0 var(--hot);
    letter-spacing:.02em;
  }
  .label .tc{
    font-family:"Noto Sans TC",sans-serif;
    font-weight:900;
  }
  .meta-tag{
    background:var(--paper);
    border:4px solid var(--ink);
    padding:10px 14px;
    font-family:"Space Mono",monospace;
    font-weight:700;
    font-size:14px;
    transform:rotate(1.5deg);
    box-shadow:6px 6px 0 var(--ink);
  }
  .meta-tag .dot{
    display:inline-block;width:10px;height:10px;background:var(--hot);
    border-radius:50%;margin-right:8px;
    animation:blink 1s steps(2) infinite;
  }
  @keyframes blink{50%{opacity:.2;}}

  /* The big time */
  .time-wrap{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
    margin:8px 0;
  }
  .time{
    font-family:"Archivo Black",sans-serif;
    font-size: clamp(120px, 18vw, 340px);
    line-height:.85;
    letter-spacing:-.03em;
    color:var(--ink);
    text-shadow: 10px 10px 0 var(--hot);
    position:relative;
    user-select:none;
    animation: pop .6s cubic-bezier(.2,1.4,.4,1);
    padding: 0 .15em;
  }
  .time::before{
    content:"";
    position:absolute;
    inset:-8px -4px;
    border:6px solid var(--ink);
    background:transparent;
    transform:rotate(-.6deg);
    z-index:-1;
  }
  @keyframes pop{
    from{transform:scale(.92) rotate(-1deg);opacity:0;}
    to{transform:scale(1) rotate(0);opacity:1;}
  }

  .status-wrap{
    margin-top:18px;
    display:flex;align-items:center;gap:18px;
    transform:rotate(-.5deg);
  }
  .status{
    font-family:"Noto Sans TC",sans-serif;
    font-weight:900;
    background:var(--hot);
    color:var(--paper);
    font-size:48px;
    padding:14px 28px 12px;
    border:6px solid var(--ink);
    box-shadow:8px 8px 0 var(--ink);
    letter-spacing:.05em;
  }
  .status[data-state="idle"]{background:var(--blue);color:var(--paper);}
  .status[data-state="ended"]{background:var(--ink);color:var(--bg);}
  .live-dot{
    width:22px;height:22px;background:var(--hot);
    border:4px solid var(--ink);border-radius:50%;
    box-shadow:0 0 0 0 var(--hot);
    animation:pulse 1.4s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(255,45,85,.7);}
    70%{box-shadow:0 0 0 22px rgba(255,45,85,0);}
    100%{box-shadow:0 0 0 0 rgba(255,45,85,0);}
  }

  /* Side panel */
  .side{
    background:var(--paper);
    color:var(--ink);
    padding:28px 28px 24px;
    display:flex;flex-direction:column;gap:18px;
    overflow:hidden;
    position:relative;
  }
  .side::after{
    content:"TPE/SCI/2026";
    position:absolute;right:-18px;bottom:64px;
    transform:rotate(-90deg);transform-origin:right bottom;
    font-family:"Space Mono",monospace;font-weight:700;
    font-size:13px;letter-spacing:.2em;opacity:.55;
  }

  .side-title{
    font-family:"Archivo Black",sans-serif;
    font-size:28px;line-height:1;
    background:var(--ink);color:var(--bg);
    padding:14px 16px 10px;
    border:5px solid var(--ink);
    transform:rotate(.6deg);
    box-shadow:6px 6px 0 var(--blue);
  }
  .interval-card{
    background:var(--bg);
    border:6px solid var(--ink);
    padding:24px 22px 26px;
    box-shadow:10px 10px 0 var(--ink);
    position:relative;
  }
  .interval-card .num{
    font-family:"Archivo Black",sans-serif;
    font-size: clamp(160px, 13vw, 220px);
    line-height:.82;
    letter-spacing:-.04em;
    color:var(--ink);
    text-shadow:8px 8px 0 var(--hot);
  }
  .interval-card .unit{
    font-family:"Noto Sans TC",sans-serif;
    font-weight:900;
    font-size: clamp(40px, 3.2vw, 56px);
    line-height:1;
    margin-top:8px;
  }
  .interval-card .desc{
    font-family:"Noto Sans TC",sans-serif;
    font-weight:900;
    font-size: clamp(22px, 1.8vw, 30px);
    margin-top:14px;
    line-height:1.35;
    border-top:4px solid var(--ink);
    padding-top:12px;
  }
  .interval-card .desc .range{
    display:block;
    font-family:"Space Mono",monospace;
    font-weight:700;
    font-size: .68em;
    margin-top:4px;
    letter-spacing:.05em;
  }
  .interval-card .stamp{
    position:absolute;top:-14px;right:-14px;
    background:var(--hot);color:var(--paper);
    font-family:"Space Mono",monospace;font-weight:700;
    font-size:12px;letter-spacing:.15em;
    padding:6px 10px;border:4px solid var(--ink);
    transform:rotate(8deg);
  }

  .clock-card{
    background:var(--ink);color:var(--bg);
    border:6px solid var(--ink);
    padding:14px 18px;
    display:flex;justify-content:space-between;align-items:center;
    font-family:"Space Mono",monospace;
    font-weight:700;font-size:16px;
    letter-spacing:.08em;
  }
  .clock-card .now{
    font-size:28px;color:var(--acid);
  }

  .schedule{
    flex:1;
    background:var(--paper);
    border:5px solid var(--ink);
    padding:10px;
    overflow:hidden;
    display:flex;flex-direction:column;
  }
  .schedule h3{
    font-family:"Archivo Black",sans-serif;
    font-size:16px;
    background:var(--ink);color:var(--bg);
    padding:6px 8px 4px;
    margin-bottom:6px;
    letter-spacing:.05em;
  }
  .schedule-grid{
    flex:1;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:4px;
    overflow:auto;
  }
  .slot{
    font-family:"Space Mono",monospace;
    font-weight:700;font-size:13px;
    background:var(--paper);
    border:2px solid var(--ink);
    padding:6px 4px;
    text-align:center;
    transition:transform .15s;
  }
  .slot.past{opacity:.35;text-decoration:line-through;}
  .slot.next{
    background:var(--hot);color:var(--paper);
    transform:scale(1.05) rotate(-2deg);
    box-shadow:3px 3px 0 var(--ink);
  }
  .slot.future{background:var(--bg);}

  /* Bottom strip */
  .footstrip{
    position:relative;z-index:2;
    height:40px;
    background:var(--ink);color:var(--bg);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 24px;
    font-family:"Space Mono",monospace;
    font-weight:700;font-size:13px;letter-spacing:.15em;
  }
  .footstrip .pill{
    background:var(--hot);color:var(--paper);
    padding:3px 10px;border:2px solid var(--bg);
  }

  /* glitch on label hover/load */
  .label{animation: jitter 6s infinite ease-in-out;}
  @keyframes jitter{
    0%,92%,100%{transform:rotate(-1.2deg) translate(0,0);}
    93%{transform:rotate(-1.2deg) translate(-2px,1px);}
    95%{transform:rotate(-1deg) translate(2px,-1px);}
    97%{transform:rotate(-1.4deg) translate(-1px,2px);}
  }

  @media (max-width: 900px){
    body{overflow:auto;}
    .stage{grid-template-columns:1fr;height:auto;}
    .main{border-right:none;border-bottom:6px solid var(--ink);min-height:80vh;}
    .label{font-size:24px;}
    .status{font-size:30px;}
    .interval-card .num{font-size:96px;}
  }
</style>
</head>
<body>

<div class="marquee">
  <div class="marquee-track" id="marquee"></div>
</div>

<main class="stage">
  <!-- 70% main panel -->
  <section class="main">
    <div class="badge-row">
      <div class="label"><span class="tc">！下一梯次活動時間！</span></div>
      <div class="meta-tag"><span class="dot"></span>TAIPEI / SCIENCE / DAY</div>
    </div>

    <div class="time-wrap">
      <div class="time" id="time">--:--</div>
    </div>

    <div class="status-wrap">
      <div class="live-dot" id="dot"></div>
      <div class="status" id="status" data-state="live">活動進行中</div>
    </div>
  </section>

  <!-- 30% side panel -->
  <aside class="side">
    <div class="side-title">EVENT / INFO</div>

    <div class="interval-card">
      <div class="stamp">INTERVAL</div>
      <div class="num">15</div>
      <div class="unit">分鐘 / MIN</div>
      <div class="desc">每一梯次隔 15 分鐘<span class="range">09:15 → 16:00</span></div>
    </div>

    <div class="clock-card">
      <span>NOW /</span>
      <span class="now" id="now">--:--:--</span>
    </div>

    <div class="schedule">
      <h3>SCHEDULE</h3>
      <div class="schedule-grid" id="grid"></div>
    </div>
  </aside>
</main>

<div class="footstrip">
  <span>★ TAIPEI SCIENCE DAY 2026 ★</span>
  <span class="pill">LIVE</span>
  <span>EST. 09:00 — 16:00</span>
</div>

<script>
  // Build session list: 9:15 to 16:00 every 15 min
  function buildSessions(){
    const out = [];
    const startMin = 9*60 + 15;     // 09:15
    const endMin   = 16*60;         // 16:00 inclusive
    for(let m = startMin; m <= endMin; m += 15){
      out.push(m);
    }
    return out;
  }
  const sessions = buildSessions();

  function pad(n){return String(n).padStart(2,"0");}
  function fmt(min){return `${pad(Math.floor(min/60))}:${pad(min%60)}`;}

  function nowMinutes(){
    const d = new Date();
    return d.getHours()*60 + d.getMinutes() + d.getSeconds()/60;
  }

  function findNext(){
    const now = nowMinutes();
    for(const s of sessions){
      if(s > now) return s;
    }
    return null; // ended
  }

  function update(){
    const now = nowMinutes();
    const next = findNext();
    const timeEl = document.getElementById("time");
    const statusEl = document.getElementById("status");
    const dotEl = document.getElementById("dot");

    // status: idle (before 9:15) / live (in range) / ended (after 16:00)
    if(now < 9*60 + 15){
      statusEl.textContent = "活動即將開始";
      statusEl.dataset.state = "idle";
      dotEl.style.background = "var(--blue)";
      timeEl.textContent = fmt(sessions[0]);
    } else if(next === null){
      statusEl.textContent = "今日活動已結束";
      statusEl.dataset.state = "ended";
      dotEl.style.background = "var(--ink)";
      timeEl.textContent = fmt(sessions[sessions.length-1]);
    } else {
      statusEl.textContent = "活動進行中";
      statusEl.dataset.state = "live";
      dotEl.style.background = "var(--hot)";
      timeEl.textContent = fmt(next);
    }

    // schedule grid
    const grid = document.getElementById("grid");
    if(grid.childElementCount !== sessions.length){
      grid.innerHTML = "";
      sessions.forEach(s=>{
        const el = document.createElement("div");
        el.className = "slot";
        el.textContent = fmt(s);
        el.dataset.min = s;
        grid.appendChild(el);
      });
    }
    [...grid.children].forEach(el=>{
      const m = +el.dataset.min;
      el.classList.remove("past","next","future");
      if(next !== null && m === next) el.classList.add("next");
      else if(m <= now) el.classList.add("past");
      else el.classList.add("future");
    });

    // live clock
    const d = new Date();
    document.getElementById("now").textContent =
      `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }

  // Marquee content
  (function(){
    const items = [
      "★ TAIPEI SCIENCE DAY 2026 ★",
      "下一梯次活動 / NEXT SESSION",
      "每 <em>15</em> 分鐘一梯",
      "09:00 — 16:00",
      "★ 歡迎光臨 / WELCOME ★",
      "SCIENCE / 科 / 學 / DAY"
    ];
    const html = items.map(t=>`<span>${t}</span>`).join("");
    // duplicate so the loop is seamless
    document.getElementById("marquee").innerHTML = html + html;
  })();

  update();
  setInterval(update, 1000);
</script>
</body>
</html>
