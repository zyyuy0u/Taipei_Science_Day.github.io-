<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>台北科學日 — 下一梯次活動時間</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Noto+Sans+TC:wght@700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
  :root{
    --bg:#FFE500;        /* brutalist yellow */
    --ink:#0A0A0A;       /* near-black */
    --paper:#FAF8F2;
    --hot:#FF2D55;       /* hot pink/red */
    --acid:#00E08A;      /* acid green accent */
    --blue:#2D4BFF;
  }

  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    width:100dvw;
    height:100dvh;
    overflow:hidden;
  }
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"Noto Sans TC","Archivo Black",system-ui,sans-serif;
    position:relative;
    display:flex;
    flex-direction:column;
  }

  /* Brutalist grid noise */
  body::before{
    content:"";
    position:fixed;inset:0;
    background-image:
      linear-gradient(var(--ink) 1px, transparent 1px),
      linear-gradient(90deg, var(--ink) 1px, transparent 1px);
    background-size:64px 64px;
    opacity:.05;
    pointer-events:none;
    z-index:0;
  }

  /* Top marquee */
  .marquee{
    position:relative;
    z-index:2;
    background:var(--ink);
    color:var(--bg);
    border-bottom:6px solid var(--ink);
    overflow:hidden;
    height:48px;
    display:flex;align-items:center;
  }
  .marquee-track{
    display:flex;gap:48px;
    white-space:nowrap;
    font-family:"Archivo Black","Noto Sans TC",sans-serif;
    font-size:20px;letter-spacing:.05em;
    animation:scroll 24s linear infinite;
  }
  .marquee span{display:inline-flex;align-items:center;gap:24px;}
  .marquee em{color:var(--hot);font-style:normal;}
  @keyframes scroll{
    from{transform:translateX(0);}
    to{transform:translateX(-50%);}
  }

  /* Layout */
  .stage{
    position:relative;z-index:1;
    flex:1;
    min-height:0;
    display:grid;
    grid-template-columns: 70% 30%;
    gap:0;
  }

  /* Main panel */
  .main{
    position:relative;
    background:var(--bg);
    border-right:6px solid var(--ink);
    padding:32px 40px 28px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    overflow:hidden;
  }

  .badge-row{
    display:flex;justify-content:space-between;align-items:flex-start;gap:16px;
  }
  .label{
    display:inline-block;
    background:var(--ink);
    color:var(--bg);
    font-family:"Archivo Black",sans-serif;
    font-size:42px;
    line-height:1;
    padding:18px 26px 14px;
    border:6px solid var(--ink);
    transform:rotate(-1.2deg);
    box-shadow:10px 10px 0 var(--hot);
    letter-spacing:.02em;
  }
  .label .tc{
    font-family:"Noto Sans TC",sans-serif;
    font-weight:900;
  }
  .meta-tag{
    background:var(--paper);
    border:4px solid var(--ink);
    padding:10px 14px;
    font-family:"Space Mono",monospace;
    font-weight:700;
    font-size:14px;
    transform:rotate(1.5deg);
    box-shadow:6px 6px 0 var(--ink);
  }
  .meta-tag .dot{
    display:inline-block;width:10px;height:10px;background:var(--hot);
    border-radius:50%;margin-right:8px;
    animation:blink 1s steps(2) infinite;
  }
  @keyframes blink{50%{opacity:.2;}}

  /* The big time */
  .time-wrap{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
    margin:8px 0;
  }
  .time{
    font-family:"Archivo Black",sans-serif;
    font-size: 200px; /* JS will scale this up to fill container */
    line-height:.85;
    letter-spacing:-.03em;
    color:var(--ink);
    text-shadow: 10px 10px 0 var(--hot);
    position:relative;
    user-select:none;
    animation: pop .6s cubic-bezier(.2,1.4,.4,1);
    padding: 0 .12em;
    white-space:nowrap;
  }
  .time::before{
    content:"";
    position:absolute;
    inset:-8px -4px;
    border:6px solid var(--ink);
    background:transparent;
    transform:rotate(-.6deg);
    z-index:-1;
  }
  @keyframes pop{
    from{transform:scale(.92) rotate(-1deg);opacity:0;}
    to{transform:scale(1) rotate(0);opacity:1;}
  }

  .status-wrap{
    margin-top:18px;
    display:flex;align-items:center;gap:18px;
    transform:rotate(-.5deg);
  }
  .status{
    font-family:"Noto Sans TC",sans-serif;
    font-weight:900;
    background:var(--hot);
    color:var(--paper);
    font-size:48px;
    padding:14px 28px 12px;
    border:6px solid var(--ink);
    box-shadow:8px 8px 0 var(--ink);
    letter-spacing:.05em;
  }
  .status[data-state="idle"]{background:var(--blue);color:var(--paper);}
  .status[data-state="ended"]{background:var(--ink);color:var(--bg);}
  .live-dot{
    width:22px;height:22px;background:var(--hot);
    border:4px solid var(--ink);border-radius:50%;
    box-shadow:0 0 0 0 var(--hot);
    animation:pulse 1.4s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(255,45,85,.7);}
    70%{box-shadow:0 0 0 22px rgba(255,45,85,0);}
    100%{box-shadow:0 0 0 0 rgba(255,45,85,0);}
  }

  /* Side panel */
  .side{
    background:var(--paper);
    color:var(--ink);
    padding:18px 20px;
    display:flex;flex-direction:column;gap:12px;
    overflow:hidden;
    position:relative;
    min-height:0;
  }
  .side::after{
    content:"TPE/SCI/2026";
    position:absolute;right:-18px;bottom:64px;
    transform:rotate(-90deg);transform-origin:right bottom;
    font-family:"Space Mono",monospace;font-weight:700;
    font-size:13px;letter-spacing:.2em;opacity:.55;
  }

  .side-title{
    font-family:"Archivo Black",sans-serif;
    font-size:28px;line-height:1;
    background:var(--ink);color:var(--bg);
    padding:14px 16px 10px;
    border:5px solid var(--ink);
    transform:rotate(.6deg);
    box-shadow:6px 6px 0 var(--blue);
  }
  .interval-card{
    background:var(--bg);
    border:6px solid var(--ink);
    padding:14px 18px 16px;
    box-shadow:8px 8px 0 var(--ink);
    position:relative;
    flex-shrink:0;
  }
  .interval-card .num-row{
    display:flex;align-items:flex-end;gap:10px;
  }
  .interval-card .num{
    font-family:"Archivo Black",sans-serif;
    font-size: clamp(110px, 9vw, 160px);
    line-height:.82;
    letter-spacing:-.04em;
    color:var(--ink);
    text-shadow:6px 6px 0 var(--hot);
  }
  .interval-card .unit{
    font-family:"Noto Sans TC",sans-serif;
    font-weight:900;
    font-size: clamp(24px, 2vw, 36px);
    line-height:1;
    padding-bottom:14px;
  }
  .interval-card .desc{
    font-family:"Noto Sans TC",sans-serif;
    font-weight:900;
    font-size: clamp(20px, 1.6vw, 26px);
    margin-top:10px;
    line-height:1.3;
    border-top:4px solid var(--ink);
    padding-top:8px;
  }
  .interval-card .desc .range{
    display:block;
    font-family:"Space Mono",monospace;
    font-weight:700;
    font-size: .65em;
    margin-top:2px;
    letter-spacing:.05em;
  }
  .interval-card .stamp{
    position:absolute;top:-14px;right:-14px;
    background:var(--hot);color:var(--paper);
    font-family:"Space Mono",monospace;font-weight:700;
    font-size:12px;letter-spacing:.15em;
    padding:6px 10px;border:4px solid var(--ink);
    transform:rotate(8deg);
  }

  .clock-card{
    background:var(--ink);color:var(--bg);
    border:6px solid var(--ink);
    padding:10px 14px;
    display:flex;justify-content:space-between;align-items:center;
    font-family:"Space Mono",monospace;
    font-weight:700;font-size:14px;
    letter-spacing:.08em;
    flex-shrink:0;
  }
  .clock-card .now{
    font-size:24px;color:var(--acid);
  }

  /* QR card */
  .qr-card{
    background:var(--paper);
    border:6px solid var(--ink);
    box-shadow:8px 8px 0 var(--blue);
    display:flex;align-items:center;gap:12px;
    padding:10px;
    flex-shrink:0;
    position:relative;
  }
  .qr-card .qr-img{
    width:110px;height:110px;
    background:#fff;
    border:3px solid var(--ink);
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }
  .qr-card .qr-img svg, .qr-card .qr-img img{
    width:100%;height:100%;display:block;
  }
  .qr-card .qr-text{
    display:flex;flex-direction:column;gap:4px;
    flex:1;min-width:0;
  }
  .qr-card .qr-title{
    font-family:"Archivo Black",sans-serif;
    font-size:22px;line-height:1;
    background:var(--hot);color:var(--paper);
    padding:6px 8px 4px;
    border:3px solid var(--ink);
    align-self:flex-start;
    transform:rotate(-1.5deg);
    letter-spacing:.04em;
  }
  .qr-card .qr-sub{
    font-family:"Noto Sans TC",sans-serif;
    font-weight:900;font-size:15px;
    line-height:1.25;
    margin-top:4px;
  }
  .qr-card .qr-host{
    font-family:"Space Mono",monospace;
    font-weight:700;font-size:10px;
    word-break:break-all;
    opacity:.7;
    line-height:1.3;
  }

  .schedule{
    flex:1;
    min-height:0;
    background:var(--paper);
    border:4px solid var(--ink);
    padding:8px;
    overflow:hidden;
    display:flex;flex-direction:column;
  }
  .schedule h3{
    font-family:"Archivo Black",sans-serif;
    font-size:14px;
    background:var(--ink);color:var(--bg);
    padding:5px 8px 3px;
    margin-bottom:6px;
    letter-spacing:.05em;
    flex-shrink:0;
  }
  .schedule-grid{
    flex:1;
    min-height:0;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:3px;
    overflow:auto;
    scrollbar-width:none;
  }
  .schedule-grid::-webkit-scrollbar{display:none;}
  .slot{
    font-family:"Space Mono",monospace;
    font-weight:700;font-size:12px;
    background:var(--paper);
    border:2px solid var(--ink);
    padding:4px 2px;
    text-align:center;
    transition:transform .15s;
    display:flex;align-items:center;justify-content:center;
    min-height:0;
  }
  .slot.past{opacity:.35;text-decoration:line-through;}
  .slot.next{
    background:var(--hot);color:var(--paper);
    transform:scale(1.05) rotate(-2deg);
    box-shadow:3px 3px 0 var(--ink);
  }
  .slot.future{background:var(--bg);}

  /* Bottom strip */
  .footstrip{
    position:relative;z-index:2;
    height:40px;
    background:var(--ink);color:var(--bg);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 24px;
    font-family:"Space Mono",monospace;
    font-weight:700;font-size:13px;letter-spacing:.15em;
  }
  .footstrip .pill{
    background:var(--hot);color:var(--paper);
    padding:3px 10px;border:2px solid var(--bg);
  }

  /* glitch on label hover/load */
  .label{animation: jitter 6s infinite ease-in-out;}
  @keyframes jitter{
    0%,92%,100%{transform:rotate(-1.2deg) translate(0,0);}
    93%{transform:rotate(-1.2deg) translate(-2px,1px);}
    95%{transform:rotate(-1deg) translate(2px,-1px);}
    97%{transform:rotate(-1.4deg) translate(-1px,2px);}
  }

  @media (max-width: 900px){
    /* Phones (QR-scan viewers): allow vertical scroll */
    html,body{height:auto;min-height:100dvh;overflow:auto;}
    .stage{grid-template-columns:1fr;}
    .main{border-right:none;border-bottom:6px solid var(--ink);min-height:75dvh;}
    .label{font-size:24px;}
    .status{font-size:30px;}
    .interval-card .num{font-size:96px;}
    .qr-card .qr-img{width:140px;height:140px;}
  }
</style>
</head>
<body>

<div class="marquee">
  <div class="marquee-track" id="marquee"></div>
</div>

<main class="stage">
  <!-- 70% main panel -->
  <section class="main">
    <div class="badge-row">
      <div class="label"><span class="tc">！下一梯次活動時間！</span></div>
      <div class="meta-tag"><span class="dot"></span>TAIPEI / SCIENCE / DAY</div>
    </div>

    <div class="time-wrap">
      <div class="time" id="time">--:--</div>
    </div>

    <div class="status-wrap">
      <div class="live-dot" id="dot"></div>
      <div class="status" id="status" data-state="live">活動進行中</div>
    </div>
  </section>

  <!-- 30% side panel -->
  <aside class="side">
    <div class="side-title">EVENT / INFO</div>

    <div class="interval-card">
      <div class="stamp">INTERVAL</div>
      <div class="num-row">
        <div class="num">15</div>
        <div class="unit">分鐘<br/>MIN</div>
      </div>
      <div class="desc">每一梯次隔 15 分鐘<span class="range">09:15 → 16:00</span></div>
    </div>

    <div class="qr-card">
      <div class="qr-img" id="qrImg"></div>
      <div class="qr-text">
        <div class="qr-title">SCAN ME</div>
        <div class="qr-sub">掃我看時刻表</div>
        <div class="qr-host" id="qrHost">—</div>
      </div>
    </div>

    <div class="clock-card">
      <span>NOW /</span>
      <span class="now" id="now">--:--:--</span>
    </div>

    <div class="schedule">
      <h3>SCHEDULE</h3>
      <div class="schedule-grid" id="grid"></div>
    </div>
  </aside>
</main>

<div class="footstrip">
  <span>★ TAIPEI SCIENCE DAY 2026 ★</span>
  <span class="pill">LIVE</span>
  <span>EST. 09:00 — 16:00</span>
</div>

<script>
  // Build session list: 9:15 to 16:00 every 15 min
  function buildSessions(){
    const out = [];
    const startMin = 9*60 + 15;     // 09:15
    const endMin   = 16*60;         // 16:00 inclusive
    for(let m = startMin; m <= endMin; m += 15){
      out.push(m);
    }
    return out;
  }
  const sessions = buildSessions();

  function pad(n){return String(n).padStart(2,"0");}
  function fmt(min){return `${pad(Math.floor(min/60))}:${pad(min%60)}`;}

  function nowMinutes(){
    const d = new Date();
    return d.getHours()*60 + d.getMinutes() + d.getSeconds()/60;
  }

  function findNext(){
    const now = nowMinutes();
    for(const s of sessions){
      if(s > now) return s;
    }
    return null; // ended
  }

  function update(){
    const now = nowMinutes();
    const next = findNext();
    const timeEl = document.getElementById("time");
    const statusEl = document.getElementById("status");
    const dotEl = document.getElementById("dot");

    // status: idle (before 9:15) / live (in range) / ended (after 16:00)
    if(now < 9*60 + 15){
      statusEl.textContent = "活動即將開始";
      statusEl.dataset.state = "idle";
      dotEl.style.background = "var(--blue)";
      timeEl.textContent = fmt(sessions[0]);
    } else if(next === null){
      statusEl.textContent = "今日活動已結束";
      statusEl.dataset.state = "ended";
      dotEl.style.background = "var(--ink)";
      timeEl.textContent = fmt(sessions[sessions.length-1]);
    } else {
      statusEl.textContent = "活動進行中";
      statusEl.dataset.state = "live";
      dotEl.style.background = "var(--hot)";
      timeEl.textContent = fmt(next);
    }

    // schedule grid
    const grid = document.getElementById("grid");
    if(grid.childElementCount !== sessions.length){
      grid.innerHTML = "";
      sessions.forEach(s=>{
        const el = document.createElement("div");
        el.className = "slot";
        el.textContent = fmt(s);
        el.dataset.min = s;
        grid.appendChild(el);
      });
    }
    let nextEl = null;
    [...grid.children].forEach(el=>{
      const m = +el.dataset.min;
      el.classList.remove("past","next","future");
      if(next !== null && m === next){ el.classList.add("next"); nextEl = el; }
      else if(m <= now) el.classList.add("past");
      else el.classList.add("future");
    });
    // Keep .next visible inside schedule-grid only — never scroll ancestors (was breaking mobile page scroll)
    if(nextEl){
      const top = nextEl.offsetTop;
      const bottom = top + nextEl.offsetHeight;
      if(top < grid.scrollTop || bottom > grid.scrollTop + grid.clientHeight){
        grid.scrollTop = Math.max(0, top - 4);
      }
    }

    // live clock
    const d = new Date();
    document.getElementById("now").textContent =
      `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;

    // Auto-fit the big time so it fills the available area without clipping
    fitTime();
  }

  function fitTime(){
    const wrap = document.querySelector(".time-wrap");
    const t = document.getElementById("time");
    if(!wrap || !t) return;
    const wrapW = wrap.clientWidth;
    const wrapH = wrap.clientHeight;
    if(wrapW < 10 || wrapH < 10) return;
    // safety margin for text-shadow + the rotated ::before frame
    const SAFE_W = 36;
    const SAFE_H = 32;
    const targetW = wrapW - SAFE_W;
    const targetH = wrapH - SAFE_H;
    // start from a known size and scale by ratio
    const probe = 200;
    t.style.fontSize = probe + "px";
    // force layout
    const rect = t.getBoundingClientRect();
    if(rect.width < 1 || rect.height < 1) return;
    const scaleW = targetW / rect.width;
    const scaleH = targetH / rect.height;
    let next = Math.floor(probe * Math.min(scaleW, scaleH));
    // clamp for sanity
    next = Math.max(120, Math.min(next, 720));
    t.style.fontSize = next + "px";
  }
  window.addEventListener("resize", fitTime);

  // Marquee content
  (function(){
    const items = [
      "★ TAIPEI SCIENCE DAY 2026 ★",
      "下一梯次活動 / NEXT SESSION",
      "每 <em>15</em> 分鐘一梯",
      "09:00 — 16:00",
      "★ 歡迎光臨 / WELCOME ★",
      "SCIENCE / 科 / 學 / DAY"
    ];
    const html = items.map(t=>`<span>${t}</span>`).join("");
    // duplicate so the loop is seamless
    document.getElementById("marquee").innerHTML = html + html;
  })();

  // Render QR pointing at this site (fallback to public GitHub Pages URL when run locally)
  (function renderQR(){
    const PUBLIC_URL = "https://zyyuy0u.github.io/Taipei_Science_Day.github.io-/";
    const url = location.protocol.startsWith("http") ? location.href : PUBLIC_URL;
    const host = url.replace(/^https?:\/\//, "");
    const hostEl = document.getElementById("qrHost");
    if(hostEl) hostEl.textContent = host;
    if(typeof qrcode === "undefined") return;
    const qr = qrcode(0, "M");
    qr.addData(url);
    qr.make();
    document.getElementById("qrImg").innerHTML =
      qr.createSvgTag({ cellSize: 4, margin: 1, scalable: true });
  })();

  update();
  setInterval(update, 1000);
  // Re-fit once webfonts have loaded (initial measurement uses fallback metrics)
  if(document.fonts && document.fonts.ready){
    document.fonts.ready.then(()=>{ fitTime(); });
  }
</script>
</body>
</html>
